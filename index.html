<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play the classic Snake Game online for free. Fast, fun, and responsive browser game with high score tracking.">
    <title>Snake Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section>
        <div class="infos">
            <div class="info">
                <h3>High Score : </h3>
                <span id="High-Score">0</span>
            </div>
            <div class="info">
                <h3 id="Scorename"> Score : </h3>
                <span id="Score">0</span>
            </div>
            <div class="info">
                <h3>Time : </h3>
                <span id="Time">00:00</span>
            </div>
        </div>

        <div class="board">
       

        </div>
    </section>

    <div class="modal">
    <div class="start-game">
        <h3 class="title">WELCOME TO SNAKE GAME</h3>
        <button class="btn btn-start">START GAME</button>
    </div>
    <div class="game-over">
        <button class="btn btn-restart">RESTART GAME</button>
    </div>
</div>
    <script src="/script.js"></script>
</body>
</html>
